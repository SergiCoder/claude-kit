name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == github.repository_owner) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-opus-4-6 --max-turns 10 --allowedTools "Bash(git diff*),Bash(git log*),Bash(git show*),Read,Glob,Grep,mcp__github__*"
          prompt: |
            Review the changes in this pull request using the skill profiles in `skills/`.
            Follow the detection rules defined in `commands/review.md`.

            ## Instructions

            1. Determine the base branch (use `dev` if it exists, otherwise `main`)
            2. Get the list of changed files: `git diff origin/$BASE...HEAD --name-only`
            3. Detect the stack by reading `package.json`, `pyproject.toml`, `requirements.txt`, `go.mod`, `pom.xml`, `build.gradle`, `composer.json`, `Gemfile`, and any `*.csproj` files if they exist
            4. Auto-detect which profiles to run following the rules in `commands/review.md` (Step 3)
            5. Read each selected profile from `skills/<profile>/SKILL.md`
            6. Run all profiles in parallel and collect findings
            7. Post a single unified review comment with this structure:

            ```
            # Code Review

            **Files changed:** <count>
            **Stack detected:** <languages and frameworks>
            **Profiles run:** <list>

            ---

            ## Critical & High Findings
            <grouped by file, deduplicated across profiles>

            ## Medium Findings
            <grouped by file>

            ## Low Findings
            <grouped by file>

            ## Summary

            | Profile | Critical | High | Medium | Low |
            |---|---|---|---|---|
            | ... | ... | ... | ... | ... |
            | **Total** | **X** | **X** | **X** | **X** |
            ```

            If there are no findings, post: "No issues found. Ready to merge."

            Do not auto-fix anything — report only.
